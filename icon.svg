  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Notebook body -->
  <rect x="112" y="96" width="288" height="340" rx="22" fill="#fffdf8" stroke="#9a6427" stroke-width="6"/>
